<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Apple Wallpapers | MCKNZ</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Orbitron', sans-serif;
        }

        body {
            background-color: black;
            color: #888;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .logo-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            text-align: center;
        }

        .logo {
            font-size: 5rem;
            font-weight: bold;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .logo a {
            text-decoration: none;
            color: inherit;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .logo span.orange {
            color: #ff7a00;
        }

        .logo span.grey {
            color: #888;
        }

        .logo span.cursor {
            color: #ff7a00;
            font-size: 1.2em;
            animation: blink 1s infinite;
        }

        .path-text {
            font-size: 1.8rem;
            font-weight: normal;
            color: #888;
            animation: fadeIn 1.2s ease-in;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .path-text a {
            color: #888;
            text-decoration: none;
        }

        .path-text a:hover {
            color: #ff7a00;
        }

        .path-text .slash {
            color: #ff7a00;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .wallpaper-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            width: 100%;
        }

        .wallpaper-card {
            background: rgba(136, 136, 136, 0.1);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.3s ease;
        }

        .wallpaper-card:hover {
            transform: translateY(-5px);
        }

        .wallpaper-card img {
            width: 100%;
            height: auto;
            border-bottom: 1px solid #444;
        }

        .download-links {
            padding: 1rem;
            display: flex;
            justify-content: center;
            gap: 1.5rem;
        }

        .download-links a {
            color: #ff7a00;
            text-decoration: none;
            font-size: 1.1rem;
            transition: color 0.3s;
        }

        .download-links a:hover,
        .download-links a:active,
        .download-links a:focus {
            color: #ff7a00;
        }

        footer {
            margin-top: 4rem;
            text-align: center;
            color: #555;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .logo-wrapper {
                flex-direction: column;
                gap: 0.25rem;
            }

            .logo {
                font-size: 2.6rem;
            }

            .path-text {
                font-size: 1.2rem;
            }

            .download-links {
                flex-direction: column;
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>

<div class="logo-wrapper">
    <div class="logo">
        <a href="../../index.html">
            <span class="orange">MCKNZ</span><span class="grey">.DEV</span>
        </a>

    </div>
    <div class="path-text">
        <a href="../wallpapers/index.html">wallpapers</a>
