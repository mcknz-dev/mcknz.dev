<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wallpapers | MCKNZ</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Orbitron', sans-serif;
    }

    body {
      background-color: black;
      color: #888;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 1200px;
    }

    .logo-wrapper {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .logo a {
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .logo {
      font-size: 5rem;
      font-weight: bold;
      white-space: nowrap;
      display: flex;
      justify-content: center;
    }

    .logo span.orange {
      color: #ff7a00;
    }

    .logo span.grey {
      color: #888;
    }

    .logo span.cursor {
      color: #ff7a00;
      font-size: 1.2em;
      animation: blink 1s infinite;
    }

    .path-text {
      font-size: 1.8rem;
      color: #888;
      animation: fadeIn 1.2s ease-in;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .wallpaper-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1rem;
      justify-items: center;
      max-width: 1100px;
      width: 100%;
      margin-bottom: 1.5rem;
    }

    .wallpaper-card {
      background: rgba(136, 136, 136, 0.2);
      border-radius: 16px;
      text-decoration: none;
      color: #ff7a00;
      max-width: 340px;
      height: 540px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      overflow: hidden;
      transition: transform 0.3s ease;
    }

    .wallpaper-card:hover {
      transform: translateY(-5px);
      cursor: pointer;
    }

    .image-wrapper {
      width: 100%;
      aspect-ratio: 9 / 17;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .image-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      padding: 0.5rem;
      border-radius: 16px;
    }

    .wallpaper-card p {
      text-align: center;
      padding: 0.75rem;
      font-size: 1.5rem;
      margin-top: auto;
    }

    footer {
      margin-top: 0.5rem;
      font-size: 0.8rem;
      color: #666;
      text-align: center;
      width: 100%;
      padding: 0.5rem 0;
    }

    @media (max-width: 768px) {
      .logo-wrapper {
        flex-direction: column;
        align-items: center;
        gap: 0.25rem;
        text-align: center;
      }

      .logo {
        font-size: 2.6rem;
      }

      .path-text {
        font-size: 1.2rem;
      }

      .wallpaper-grid {
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
        align-items: center;
      }

      .wallpaper-card {
        width: 100%;
        max-width: 420px;
        height: 520px;
      }

      .wallpaper-card p {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="logo-wrapper">
    <div class="logo">
      <a href="../index.html">
        <span class="orange">MCKNZ</span><span class="grey">.DEV</span><span class="cursor">|</span>
      </a>
    </div>
    <span class="path-text">wallpapers</span>
  </div>

  <div class="wallpaper-grid">
    <a href="apple/index.html" class="wallpaper-card">
      <div class="image-wrapper">
        <img src="apple/1.png" alt="Apple Wallpaper" />
      </div>
      <p> Coded Core</p>
    </a>

    <a href="#" class="wallpaper-card">
      <div class="image-wrapper">
        <img src="android/soon.png" alt="Android Wallpaper" />
      </div>
      <p>🤖 Android Collection</p>
    </a>

    <a href="#" class="wallpaper-card">
      <div class="image-wrapper">
        <img src="csoon.png" alt="Coming Soon" />
      </div>
      <p>🪐 New Collection</p>
    </a>
  </div>

  <footer>
    &copy; 2025 MCKNZ.DEV · Created by Mackenzie
  </footer>
</div>

</body>
</html>
