<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000"> <!-- Fix for Safari white bar -->
    <title>Coming Soon | MCKNZ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&display=swap');
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Orbitron', sans-serif;
        }
        body {
            background: #000000;
            color: #00ffff;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            padding: 20px;
            position: relative;
        }
        .container {
            width: 90%;
            max-width: 800px;
            position: relative;
        }
        .title-box {
            display: inline-block;
            padding: 30px;
            background: rgba(10, 10, 10, 0.9);
            border: 4px solid #00ffff;
            box-shadow: 0px 0px 25px rgba(0, 255, 255, 0.9);
            border-radius: 20px;
            max-width: 100%;
            position: relative;
        }
        h1 {
            font-size: 10vw;
            color: #00ffff;
            text-transform: uppercase;
            text-shadow: 0 0 30px rgba(0, 255, 255, 1);
            white-space: nowrap;
        }
        h1 {
    font-size: clamp(40px, 10vw, 120px); /* Limits growth */
    max-width: 100%; /* Ensures it doesn’t exceed container */
}
  
        p {
            font-size: 1.5rem;
            margin-top: 20px;
            color: #b0f0ff;
        }
        .footer {
            margin-top: 30px;
            font-size: 1rem;
            color: #00cccc;
        }
        @media screen and (max-width: 600px) {
            h1 {
                font-size: 15vw;
            }
        
            .title-box {
                padding: 20px;
            }
            p {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title-box">
            <h1>MCKNZ</h1>
        </div>
        <p>🚀 The future is being built...</p>
        <div class="footer">&copy; 2025 MCKNZ. All rights reserved.</div>
    </div>
</body>
</html>
