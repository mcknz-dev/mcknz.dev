<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>mcknz.dev | Developer</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet" />
    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
            Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
            background-color: #f5f5f7;
            color: #1d1d1f;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }
        .logo {
            font-family: 'Orbitron', sans-serif;
            font-weight: 400;
            font-size: 8rem;
            margin-bottom: 10px;
            letter-spacing: 0.06em;
            white-space: nowrap;
            display: inline-block;
        }
        .logo .mcknz {
            color: #F58220; /* Matched orange */
        }
        .logo .dev {
            color: #7C7C7C; /* Matched grey */
        }
        .cursor {
            display: inline-block;
            width: 12px;
            background-color: #f58220;
            margin-left: 6px;
            animation: blink 1s steps(2, start) infinite;
            vertical-align: bottom;
            height: 1.2em;
        }
        @keyframes blink {
            0%, 50% { background-color: #f58220; }
            50.1%, 100% { background-color: transparent; }
        }
        p.subtitle {
            font-size: 1.5rem;
            font-weight: 400;
            color: #6e6e73;
            margin: 20px 0 0;
        }
    </style>
</head>
<body>
<div class="logo">
    <span id="typed-text"></span><span class="cursor"></span>
</div>
<p class="subtitle">Coming Soon</p>

<script>
    const orangePart = 'MCKNZ';
    const greyPart = '.DEV';
    const typedTextElement = document.getElementById('typed-text');

    let buffer = '';
    let i = 0;
    let phase = 0;

    function type() {
        if (phase === 0) {
            if (i < orangePart.length) {
                buffer += orangePart[i];
                typedTextElement.innerHTML = `<span class="mcknz">${buffer}</span>`;
                i++;
                setTimeout(type, 120);
            } else {
                phase = 1;
                i = 0;
                buffer = '';
                setTimeout(type, 150);
            }
        } else if (phase === 1) {
            if (i < greyPart.length) {
                buffer += greyPart[i];
                typedTextElement.innerHTML =
                    `<span class="mcknz">${orangePart}</span><span class="dev">${buffer}</span>`;
                i++;
                setTimeout(type, 120);
            }
        }
    }
    window.onload = type;
</script>
</body>
</html>
