<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MCKNZ.DEV</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="favicon.png">
</head>
<body>
<div class="container">

    <!-- Logo -->
    <div class="logo">
        <span id="typed-logo"><span class="orange"></span><span class="grey"></span></span>
        <span class="cursor">|</span>
    </div>

    <!-- Contact Info Tiles -->
  <!-- Email stays visible -->
  <a href="mailto:hello@mcknz.dev" class="box contact-tile email-tile">
    <i class="fas fa-envelope"></i><br><span class="email-text">hello@mcknz.dev</span>
  </a>

  <!-- These will be hidden on mobile -->
  <a href="about.html" class="box hide-mobile" target="_blank">
    <i class="fas fa-user"></i><br>About
  </a>

  <a href="projects.html" class="box hide-mobile" target="_blank">
    <i class="fas fa-folder-open"></i><br>Projects
  </a>

  <a href="/wallpapers/index.html" class="box" target="_blank">
    <i class="fas fa-image"></i><br>Wallpapers
  </a>

  <!-- Coming Soon tiles hidden on mobile -->
  <div class="box placeholder-tile hide-mobile">
    <i class="fas fa-laptop-code"></i><br>Coming Soon
  </div>
  <div class="box placeholder-tile hide-mobile">
    <i class="fas fa-laptop-code"></i><br>Coming Soon
  </div>

  <!-- === Social Tiles Row (Centered & Clean) === -->
  <div class="social-box-container">
    <a href="https://www.instagram.com/mcknz.dev" class="box" target="_blank" aria-label="Instagram">
      <i class="fab fa-instagram"></i>
    </a>
    <a href="https://github.com/mcknz-dev" class="box" target="_blank" aria-label="GitHub">
      <i class="fab fa-github"></i>
    </a>
    <a href="#" class="box" target="_blank" aria-label="Threads">
      <i class="fab fa-threads"></i>
    </a>
    <a href="#" class="box" target="_blank" aria-label="LinkedIn">
      <i class="fab fa-linkedin"></i>
    </a>
    <button id="theme-toggle" class="box" aria-label="Toggle dark mode">
      <i class="fas fa-moon"></i>
    </button>
  </div>

    <!-- Footer -->
    <footer>
        &copy; 2025 MCKNZ.DEV · Created by Mackenzie
    </footer>
</div>

<script src="script.js"></script>
</body>
</html>
