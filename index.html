<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCKNZ Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Orbitron', sans-serif;
        }

        body {
            background-color: black;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            color: #888;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            max-width: 900px;
            width: 100%;
        }

        .logo {
            grid-column: span 3;
            text-align: center;
            font-size: 7.6rem;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            white-space: nowrap;
        }

        .typewriter {
            overflow: hidden;
            display: inline-block;
            width: 0;
            animation: typing 2.5s steps(9, end) forwards;
        }

        .typewriter span.orange {
            color: #ff7a00;
        }

        .typewriter span.grey {
            color: #888;
        }

        .cursor {
            color: #ff7a00;
            animation: blink 1s infinite;
        }

        @keyframes typing {
            from { width: 0; }
            to { width: 9ch; }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .box {
            background: rgba(136, 136, 136, 0.2);
            padding: 1.5rem;
            border-radius: 15px;
            text-align: center;
            color: #ff7a00;
            box-shadow: none;
            transition: transform 0.3s ease;
            text-decoration: none;
            display: block;
        }

        .box:hover {
            transform: translateY(-5px);
            cursor: pointer;
        }

        .box i {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: #888;
        }

        .social-box-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1.5rem;
            grid-column: span 3;
        }

        .social-box {
            background: rgba(136, 136, 136, 0.2);
            padding: 1.5rem;
            border-radius: 15px;
            text-align: center;
            color: #ff7a00;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
        }

        .social-box i {
            font-size: 1.5rem;
            color: #818188;
        }

        .social-box:hover {
            transform: translateY(-5px);
            cursor: pointer;
        }

        footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            text-align: center;
            color: #666;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }

            .logo {
                font-size: 3.5rem;
                flex-wrap: wrap;
            }

            .social-box-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">
      <span class="typewriter">
        <span class="orange">MCKNZ</span><span class="grey">.DEV</span>
      </span>
        <span class="cursor">|</span>
    </div>

    <a href="about.html" class="box" target="_blank"><i class="fas fa-user"></i><br>About</a>
    <a href="resume.html" class="box" target="_blank"><i class="fas fa-download"></i><br>Resume</a>
    <a href="projects.html" class="box" target="_blank"><i class="fas fa-folder-open"></i><br>Projects</a>
    <a href="contact.html" class="box" target="_blank"><i class="fas fa-envelope"></i><br>Contact</a>
    <a href="wallpapers.html" class="box" target="_blank"><i class="fas fa-image"></i><br>Wallpapers</a>
    <a href="terminal.html" class="box" target="_blank"><i class="fas fa-terminal"></i><br>Terminal</a>

    <div class="social-box-container">
        <a href="#" class="social-box" target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="#" class="social-box" target="_blank"><i class="fab fa-github"></i></a>
        <a href="#" class="social-box" target="_blank"><i class="fab fa-threads"></i></a>
        <a href="#" class="social-box" target="_blank"><i class="fab fa-x-twitter"></i></a>
        <a href="#" class="social-box" target="_blank"><i class="fab fa-linkedin"></i></a>
    </div>
</div>

<footer>
    &copy; 2025 Mackenzie. All rights reserved.
</footer>
</body>
</html>
