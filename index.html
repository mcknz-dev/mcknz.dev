<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCKNZ</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Orbitron', sans-serif;
    }

    body {
      background-color: black;
      color: #888;
      padding: 2rem;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      max-width: 900px;
      width: 100%;
      margin-top: 2rem;
      align-content: center;
      justify-content: center;
    }

    .logo {
      grid-column: span 3;
      text-align: center;
      font-size: 7.2rem;
      font-weight: bold;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
      white-space: nowrap;
    }

    .logo span.orange {
      color: #ff7a00;
    }

    .logo span.grey {
      color: #888;
    }

    .logo span.cursor {
      color: #ff7a00;
      font-size: 1.2em;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .box {
      background: rgba(136, 136, 136, 0.2);
      padding: 1.5rem;
      border-radius: 15px;
      text-align: center;
      color: #ff7a00;
      box-shadow: none;
      transition: transform 0.3s ease;
      text-decoration: none;
      display: block;
    }

    .box:hover {
      transform: translateY(-5px);
      cursor: pointer;
    }

    .box i {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      color: #888;
    }

    .social-box-container {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 1.5rem;
      grid-column: span 3;
    }

    .social-box {
      background: rgba(136, 136, 136, 0.2);
      padding: 1.5rem;
      border-radius: 15px;
      text-align: center;
      color: #ff7a00;
      display: flex;
      justify-content: center;
      align-items: center;
      text-decoration: none;
    }

    .social-box i {
      font-size: 1.5rem;
      color: #818188;
    }

    .social-box:hover {
      transform: translateY(-5px);
      cursor: pointer;
    }

    footer {
      grid-column: span 3;
      text-align: center;
      font-size: 0.8rem;
      color: #666;
      padding: 2rem 0 1rem;
      max-width: 100%;
      overflow-wrap: break-word;
    }

    @media (max-width: 768px) {
      body {
        padding: 1rem;
      }

      .container {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        align-items: center;
        padding: 0;
        margin-top: 1rem;
      }

      .logo {
        font-size: 3rem;
        flex-wrap: nowrap;
        justify-content: center;
      }

      .logo .cursor {
        font-size: 1.6rem;
      }

      .box {
        width: 100%;
        max-width: 400px;
        padding: 1rem;
      }

      .social-box-container {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        width: 100%;
        align-items: center;
      }

      .social-box {
        width: 100%;
        max-width: 400px;
      }

      .social-box i {
        font-size: 1.2rem;
      }

      footer {
        font-size: 0.75rem;
        text-align: center;
        width: 100%;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="logo">
    <span class="orange">MCKNZ</span><span class="grey">.DEV</span><span class="cursor">|</span>
  </div>

  <a href="about.html" class="box" target="_blank"><i class="fas fa-user"></i><br>About</a>
  <a href="resume.html" class="box" target="_blank"><i class="fas fa-download"></i><br>Resume</a>
  <a href="projects.html" class="box" target="_blank"><i class="fas fa-folder-open"></i><br>Projects</a>
  <a href="contact.html" class="box" target="_blank"><i class="fas fa-envelope"></i><br>Contact</a>
  <a href="" class="box" target="_blank"><i class="fas fa-image"></i><br>Wallpapers</a>
  <a href="terminal.html" class="box" target="_blank"><i class="fas fa-terminal"></i><br>Terminal</a>

  <div class="social-box-container">
    <a href="#" class="social-box" target="_blank"><i class="fab fa-instagram"></i></a>
    <a href="#" class="social-box" target="_blank"><i class="fab fa-github"></i></a>
    <a href="#" class="social-box" target="_blank"><i class="fab fa-threads"></i></a>
    <a href="#" class="social-box" target="_blank"><i class="fab fa-x-twitter"></i></a>
    <a href="#" class="social-box" target="_blank"><i class="fab fa-linkedin"></i></a>
  </div>

  <footer>
    &copy; 2025 MCKNZ.DEV · Created by Mackenzie
  </footer>
</div>
</body>
</html>
