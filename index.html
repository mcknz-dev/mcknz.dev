<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | MCKNZ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Orbitron', sans-serif;
        }
        body {
            background-color: #000000;
            color: #ffffff;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            padding: 20px;
            background: rgba(0, 0, 0, 0.95);
            border: 3px solid #ff3333;
            box-shadow: 0px 0px 8px rgba(255, 51, 51, 0.6);
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
        }
        h1 {
            font-size: 3rem;
            color: #ff3333;
            text-transform: uppercase;
            text-shadow: 2px 2px 5px rgba(255, 51, 51, 0.6);
        }
        p {
            font-size: 1.2rem;
            margin-top: 10px;
            color: #aaa;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: #ff3333;
            color: #000;
            text-decoration: none;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 5px;
            transition: 0.3s;
            box-shadow: 0px 0px 6px rgba(255, 51, 51, 0.6);
        }
        .btn:hover {
            background: #cc0000;
        }
        .footer {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #777;
        }
        form {
            margin-top: 20px;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: 1px solid #ff3333;
            border-radius: 5px;
            background: #111;
            color: white;
        }
        button {
            padding: 12px 24px;
            background: #ff3333;
            color: black;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
            box-shadow: 0px 0px 6px rgba(255, 51, 51, 0.6);
        }
        button:hover {
            background: #cc0000;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>MCKNZ</h1>
    <p>coming soon...</p>
    <form action="https://formsubmit.co/dev.mcknz@gmail.com" method="POST">
        <input type="text" name="name" placeholder="Your Name" required>
        <input type="email" name="email" placeholder="Your Email" required>
        <textarea name="message" placeholder="Your Message" required></textarea>
        <button type="submit">Contact Me</button>
    </form>
    <div class="footer">&copy; 2025 MCKNZ. All rights reserved.</div>
</div>
</body>
</html>
